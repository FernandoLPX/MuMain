name: Build MuMain

on:
  push:
  workflow_dispatch:

jobs:

  build:
    runs-on: windows-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1

      - name: Build client
        run: msbuild MuMain.sln /p:Configuration=Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mu-client
          path: |
            **/Release/*.exe
